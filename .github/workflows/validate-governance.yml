name: Validate governance

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GOVERNANCE_READ_TOKEN: ${{ secrets.LINQORA_GOVERNANCE_READ_TOKEN || secrets.LINQORA_GOVERNANCE_TOKEN }}
      REQUIRE_GOVERNANCE_TOKEN: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate local governance hygiene
        shell: bash
        run: |
          set -euo pipefail

          if [ -f ".github/workflows/validate-agents.yml" ]; then
            echo "::error::.github/workflows/validate-agents.yml is legacy. Use validate-governance.yml."
            exit 1
          fi

          scan_targets=()
          for path in AGENTS.md .github scripts; do
            if [ -e "$path" ]; then
              scan_targets+=("$path")
            fi
          done

          if [ "${#scan_targets[@]}" -gt 0 ] && grep -R --line-number --exclude="validate-governance.yml" -E "sync-agent-guidelines|distribute-agent-guidelines" "${scan_targets[@]}"; then
            echo "::error::Legacy AGENTS synchronization references are not allowed."
            exit 1
          fi

      - name: Check governance read token
        id: token
        shell: bash
        run: |
          if [ -z "${GOVERNANCE_READ_TOKEN}" ]; then
            if [ "${REQUIRE_GOVERNANCE_TOKEN}" = "true" ]; then
              echo "::error::LINQORA_GOVERNANCE_READ_TOKEN is required for governance validation."
              exit 1
            fi

            echo "::warning::LINQORA_GOVERNANCE_READ_TOKEN is not available for forked pull request; governance drift check skipped."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout governance
        if: ${{ steps.token.outputs.available == 'true' }}
        uses: actions/checkout@v7
        with:
          repository: erdrako/linqora-project
          ref: main
          path: linqora-project
          token: ${{ secrets.LINQORA_GOVERNANCE_READ_TOKEN || secrets.LINQORA_GOVERNANCE_TOKEN }}

      - name: Setup Node.js
        if: ${{ steps.token.outputs.available == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2

      - name: Validate governance drift
        if: ${{ steps.token.outputs.available == 'true' }}
        run: |
          node linqora-project/scripts/replicate-governance.mjs \
            --check \
            --target "$GITHUB_WORKSPACE" \
            --repo linqora-chatbot-test-page
