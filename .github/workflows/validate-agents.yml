name: Validate AGENTS

on:
  pull_request:
    paths:
      - "AGENTS.md"
      - ".github/workflows/validate-agents.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GOVERNANCE_TOKEN: ${{ secrets.LINQORA_GOVERNANCE_TOKEN }}
      REQUIRE_GOVERNANCE_TOKEN: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check governance token
        id: token
        shell: bash
        run: |
          if [ -z "${GOVERNANCE_TOKEN}" ]; then
            if [ "${REQUIRE_GOVERNANCE_TOKEN}" = "true" ]; then
              echo "::error::LINQORA_GOVERNANCE_TOKEN is required for governance validation."
              exit 1
            fi

            echo "::warning::LINQORA_GOVERNANCE_TOKEN is not available for forked pull request; AGENTS drift check skipped."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout governance
        if: ${{ steps.token.outputs.available == 'true' }}
        uses: actions/checkout@v7
        with:
          repository: erdrako/linqora-project
          ref: main
          path: linqora-project
          token: ${{ secrets.LINQORA_GOVERNANCE_TOKEN }}

      - name: Setup Node.js
        if: ${{ steps.token.outputs.available == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 20.20.2

      - name: Validate AGENTS drift
        if: ${{ steps.token.outputs.available == 'true' }}
        run: node linqora-project/scripts/sync-agents.mjs --check --target "$GITHUB_WORKSPACE" --repo linqora-chatbot-test-page
